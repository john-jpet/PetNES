<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetNES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #39ff14;
      --green-dim:  #1c6b08;
      --green-glow: rgba(57,255,20,0.18);
      --red:        #ff3355;
      --red-glow:   rgba(255,51,85,0.35);
      --bg:         #060a06;
      --panel-bg:   #090e09;
      --border:     #173317;
      --text:       #8dba8d;
      --text-dim:   #3d5c3d;
      --bezel:      #0b100b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'VT323', monospace;
      font-size: 18px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 8px;
    }
    h1 {
      font-size: 2rem;
      letter-spacing: 0.35em;
      color: var(--red);
      text-shadow: 0 0 12px var(--red-glow), 0 0 30px var(--red-glow);
    }
    h1 span { color: var(--text-dim); font-size: 0.7rem; letter-spacing: 0.1em; vertical-align: middle; margin-left: 10px; }

    /* ── Bezel ── */
    #bezel {
      background: var(--bezel);
      border: 2px solid #0f1f0f;
      border-radius: 14px;
      padding: 20px 22px 16px;
      box-shadow:
        0 0 0 1px #050905,
        0 0 40px rgba(0,0,0,0.8),
        inset 0 0 30px rgba(0,0,0,0.9),
        0 0 20px var(--green-glow);
      position: relative;
    }
    #bezel::before {
      content: 'PETNES  •  DISPLAY';
      position: absolute;
      top: 6px; left: 50%; transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
    }

    /* Screen wrap — fullscreen target */
    #screen-wrap {
      display: block;
      line-height: 0;
    }
    #screen-wrap:fullscreen,
    #screen-wrap:-webkit-full-screen {
      background: #000;
    }

    canvas {
      display: block;
      width: 768px;
      height: 720px;
      image-rendering: pixelated;
      outline: none;
    }

    /* ── Toolbar ── */
    #toolbar {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 10px 20px 4px;
    }
    .tb-sep { flex: 1; }

    /* ── Info bar ── */
    #infobar {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 4px 20px 14px;
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    #fps { color: var(--green); min-width: 60px; }
    #status { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #vol-wrap { display: flex; align-items: center; gap: 6px; }

    /* ── Keys hint ── */
    .keys {
      font-size: 0.72rem;
      color: var(--text-dim);
      padding-bottom: 18px;
      letter-spacing: 0.05em;
    }
    kbd {
      background: #0d180d;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: 'VT323', monospace;
      font-size: 0.72rem;
      color: var(--text);
    }

    /* ── Buttons ── */
    button, label.btn {
      font-family: 'VT323', monospace;
      font-size: 1rem;
      letter-spacing: 0.08em;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 3px 12px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s, box-shadow 0.12s;
      user-select: none;
    }
    button:hover:not(:disabled), label.btn:hover {
      color: var(--green);
      border-color: var(--green-dim);
      box-shadow: 0 0 6px var(--green-glow);
    }
    button:disabled { opacity: 0.3; cursor: default; }
    button.active {
      color: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 8px var(--green-glow), inset 0 0 6px rgba(57,255,20,0.08);
    }
    #btn-menu {
      color: var(--text);
      border-color: var(--border);
      font-size: 1.1rem;
      padding: 3px 14px;
    }
    #btn-menu:hover { color: var(--green); border-color: var(--green-dim); }

    input[type="file"] { display: none; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 80px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 4px var(--green-glow);
    }

    /* ── Settings overlay ── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    #overlay.open { opacity: 1; pointer-events: all; }

    /* ── Settings panel ── */
    #settings {
      position: fixed;
      top: 0; right: 0;
      width: 310px;
      height: 100vh;
      background: var(--panel-bg);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 30px rgba(0,0,0,0.7);
      z-index: 100;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #settings.open { transform: translateX(0); }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--green);
      letter-spacing: 0.2em;
      font-size: 1.1rem;
    }
    #btn-close {
      border: none;
      font-size: 1.3rem;
      padding: 0 6px;
      color: var(--text-dim);
    }
    #btn-close:hover { color: var(--red); border-color: transparent; box-shadow: none; }

    .panel-body { flex: 1; overflow-y: auto; padding: 0 0 20px; }

    .panel-section {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .panel-section h3 {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .btn-row { display: flex; flex-wrap: wrap; gap: 6px; }

    /* Channel toggles */
    .ch-btn {
      min-width: 46px;
      font-size: 0.85rem;
      padding: 2px 8px;
    }
    .ch-btn.active {
      color: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
    }
    .ch-btn:not(.active) { color: var(--text-dim); border-color: var(--text-dim); opacity: 0.5; }

    /* Palette grid */
    #palette-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 3px;
      margin-top: 8px;
    }
    .pal-swatch {
      aspect-ratio: 1;
      border-radius: 2px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
    }
    .pal-swatch:hover {
      transform: scale(1.25);
      border-color: var(--green);
      z-index: 1;
      position: relative;
    }
    .speed-btn {
      font-size: 0.85rem;
      padding: 2px 8px;
      color: var(--text-dim);
      border-color: var(--text-dim);
    }
    .speed-btn.active {
      color: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
    }

    /* Library */
    #library-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 4px;
    }
    .lib-card {
      background: #0a140a;
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.12s;
      position: relative;
    }
    .lib-card:hover { border-color: var(--green); }
    .lib-card img {
      width: 100%;
      display: block;
      image-rendering: pixelated;
    }
    .lib-card-name {
      font-size: 0.7rem;
      padding: 3px 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .lib-card-del {
      position: absolute;
      top: 2px; right: 2px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: var(--text-dim);
      font-size: 0.65rem;
      padding: 1px 4px;
      cursor: pointer;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .lib-card:hover .lib-card-del { opacity: 1; }
    .lib-card-del:hover { color: var(--red) !important; }

    .preset-btn {
      font-size: 0.75rem;
      padding: 2px 8px;
      color: var(--text-dim);
      border-color: var(--text-dim);
    }
    .preset-btn.active {
      color: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
    }
    #btn-reset-pal {
      margin-top: 10px;
      font-size: 0.8rem;
      padding: 2px 10px;
      color: var(--text-dim);
      border-color: var(--text-dim);
    }
    #btn-reset-pal:hover { color: var(--red); border-color: var(--red); box-shadow: none; }
  </style>
</head>
<body>

<header>
  <h1>PETNES <span>v1.0</span></h1>
  <button id="btn-menu">⚙ MENU</button>
</header>

<div id="bezel">
  <div id="screen-wrap">
    <canvas id="screen" width="768" height="720" tabindex="0"></canvas>
  </div>
</div>

<div id="toolbar">
  <label class="btn" for="rom-input">▶ LOAD ROM</label>
  <input type="file" id="rom-input" accept=".nes" />
  <button id="btn-pause"      disabled>⏸ PAUSE</button>
  <button id="btn-reset"      disabled>↺ RESET</button>
  <button id="btn-save"       disabled>💾 SAVE</button>
  <button id="btn-load-state" disabled>📂 LOAD</button>
  <span style="color:var(--border);padding:0 2px">│</span>
  <button class="speed-btn" data-speed="0.5">½×</button>
  <button class="speed-btn active" data-speed="1">1×</button>
  <button class="speed-btn" data-speed="2">2×</button>
  <button class="speed-btn" data-speed="4">4×</button>
</div>

<div id="infobar">
  <span id="fps"></span>
  <div id="vol-wrap">🔊<input type="range" id="volume" min="0" max="1" step="0.05" value="0.5"></div>
  <span id="status">Load a .nes ROM to start.</span>
</div>

<div class="keys">
  <kbd>←↑↓→</kbd> D-pad &nbsp;
  <kbd>Z</kbd> B &nbsp; <kbd>X</kbd> A &nbsp;
  <kbd>Enter</kbd> Start &nbsp; <kbd>Shift</kbd> Select &nbsp;
  <kbd>Tab</kbd> Turbo &nbsp; <kbd>F5</kbd> Save &nbsp; <kbd>F8</kbd> Load
</div>

<!-- Settings drawer -->
<div id="overlay"></div>
<div id="settings">
  <div class="panel-header">
    <span>// SETTINGS</span>
    <button id="btn-close">✕</button>
  </div>
  <div class="panel-body">

    <div class="panel-section">
      <h3>ROM LIBRARY</h3>
      <div id="library-grid"></div>
      <p id="library-empty" style="font-size:0.8rem;color:var(--text-dim);margin-top:6px">
        No ROMs saved yet. Load a ROM to add it.
      </p>
    </div>

    <div class="panel-section">
      <h3>DISPLAY</h3>
      <div class="btn-row">
        <button id="btn-crt"        class="active">⬛ CRT FILTER</button>
        <button id="btn-fullscreen">⛶ FULLSCREEN</button>
        <button id="btn-screenshot">📷 SCREENSHOT</button>
      </div>
    </div>

    <div class="panel-section">
      <h3>AUDIO CHANNELS</h3>
      <div class="btn-row" id="channel-toggles">
        <button class="ch-btn active" data-ch="0">PL1</button>
        <button class="ch-btn active" data-ch="1">PL2</button>
        <button class="ch-btn active" data-ch="2">TRI</button>
        <button class="ch-btn active" data-ch="3">NOI</button>
        <button class="ch-btn active" data-ch="4">DMC</button>
      </div>
    </div>

    <div class="panel-section">
      <h3>PALETTE EDITOR</h3>
      <div class="btn-row" id="palette-presets" style="margin-bottom:10px">
        <button class="preset-btn active" data-preset="authentic">AUTHENTIC</button>
        <button class="preset-btn" data-preset="vibrant">VIBRANT</button>
        <button class="preset-btn" data-preset="warm">WARM</button>
        <button class="preset-btn" data-preset="cool">COOL</button>
        <button class="preset-btn" data-preset="mono">MONO</button>
        <button class="preset-btn" data-preset="phosphor">PHOSPHOR</button>
      </div>
      <div id="palette-grid"></div>
      <button id="btn-reset-pal">↺ RESET PALETTE</button>
    </div>

  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
